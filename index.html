<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anamnese Lufa-Lufa - Consultoria Matheus</title>

    <style>
        /* 1. AS VARIÁVEIS (O Coração do Template) */
        :root {
            --amarelo-lufa: #ffdb00;
            --preto-fundo: #0e0e0e;
            --cinza-card: #1c1c1c;
            --texto-claro: #f0f0f0;
            --brilho: rgba(255, 219, 0, 0.4);
        }

        /* 2. O FUNDO E EFEITO DE MARCA D'ÁGUA */
        body {
            background-color: var(--preto-fundo);
            background-image: url('https://www.transparentpng.com/download/harry-potter/hufflepuff-logo-hd-png-re7YpS.png');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            background-size: 50%;
            /* O Texugo fica gigante no fundo */
            /* O filtro abaixo deixa a imagem de fundo bem escura para não atrapalhar a leitura */
            background-blend-mode: overlay;
            color: var(--texto-claro);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        /* 3. O CONTAINER COM BRILHO MÁGICO */
        .container {
            background-color: var(--cinza-card);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--amarelo-lufa);
            max-width: 450px;
            width: 100%;
            box-shadow: 0 0 25px var(--brilho);
            /* O efeito de aura */
            backdrop-filter: blur(5px);
            /* Efeito de vidro fosco se o fundo for imagem */
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header img {
            width: 100px;
            filter: drop-shadow(0 0 10px var(--amarelo-lufa));
            /* Brilho na imagem */
        }

        h1 {
            color: var(--amarelo-lufa);
            margin-top: 10px;
            font-size: 22px;
        }

        .campo-grupo {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--amarelo-lufa);
            font-weight: bold;
            font-size: 14px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
            letter-spacing: 0;
            line-height: normal;
            font-size: 16px;
            /* Tamanho bom para leitura no celular */
        }



        /* 4. EFEITO DE FOCO (ENCANTAMENTO AO CLICAR) */
        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--amarelo-lufa);
            box-shadow: 0 0 10px var(--amarelo-lufa);
            background-color: #333;
        }

        /* 5. O BOTÃO "JURAR FIDELIDADE" */
        button {
            background-color: var(--amarelo-lufa);
            color: #000;
            border: none;
            padding: 18px;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }

        button:hover {
            transform: scale(1.03);
            /* Aumenta levemente */
            box-shadow: 0 0 20px var(--amarelo-lufa);
            /* Brilha forte no hover */
            letter-spacing: 1px;
            /* Espaça as letras para dar efeito de impacto */
        }

        .nota-imc {
            font-size: 12px;
            color: #aaa;
            border-left: 3px solid var(--amarelo-lufa);
            padding-left: 10px;
            margin-top: 10px;
        }
    </style>
</head>
